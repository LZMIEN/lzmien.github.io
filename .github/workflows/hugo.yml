name: Deploy Hugo Site to GitHub Pages

on:
  # 触发条件：推送到 main 分支时
  push:
    branches: [ "main" ]
  # 可选：手动触发
  workflow_dispatch:

# 设置权限，确保有写入内容的权限
permissions:
  contents: write

jobs:
  # 构建和部署任务
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true  # 或 'recursive'，用于获取 Hugo 主题
          fetch-depth: 0    # 获取所有历史记录，用于 .GitInfo 和 .Lastmod

      # 2. 设置 Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'  # 或指定版本，如 '0.110.0'
          extended: true          # 如需使用 SCSS 等扩展功能

      # 3. 构建网站
      - name: Build
        run: hugo --minify

      # 4. 部署到 GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages  # 默认，无需显式指定
